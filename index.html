<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>huffduff-rss</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      max-width: 960px;
      margin: 10px auto;
    }

    h1 {
      font-family: serif;
    }

    a.bookmarklet {
      margin: 1.5em;
      border: 1px solid blue;
      padding: 0.5em;
      font-style: italic;
      text-decoration: none;
      background-color: #acf;
    }

    .warning {
      background-color: #eee;
      padding: 1.5em;
      width: 80%;
      margin: 1.5em auto;
      text-align: left;
    }

    input[type=url], input[type=submit] {
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
    }

    input[type=url] {
      width: 80%;
    }

    input[type=file] {
      display: block;
      margin: 12px auto 0;
    }

    .drop-zone {
      width: 80%;
      margin: 16px auto 0;
      padding: 1.5em;
      border: 2px dashed #88a;
      background: #f8f9ff;
      color: #444;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease;
      user-select: none;
    }

    .drop-zone.dragover {
      background: #eef4ff;
      border-color: #446;
    }

    .drop-zone small {
      display: block;
      margin-top: 0.5em;
      color: #666;
    }

    header, section, form {
      margin: 3em 0;
    }

    footer {
      margin-top: 6em;
    }
  </style>
</head>
<body>

<header>
  <h1>huffduff-rss</h1>
  <p>Extracts an episode of a RSS feed and sends it to <a href="https://huffduffer.com/">Huffduffer</a>.</p>
</header>

<section>
  <form id="rss-form" action="javascript:void(0);">
    <label for="url">Enter a RSS URL here:</label><br>
    <input id="url" type="url" name="url" placeholder="URL" required>
    <input type="submit" value="Go">
  </form>
  <div id="drop-zone" class="drop-zone" role="button" tabindex="0" aria-label="Feed datei hochladen oder hierher ziehen">
    Oder eine Feed-Datei hierher ziehen
    <small>XML, RSS oder Atom lokal laden und ohne CORS-Probleme anzeigen</small>
    <input id="file-input" type="file" accept=".xml,.rss,.atom,.rdf,.feed,text/xml,application/xml,application/rss+xml,application/atom+xml">
  </div>
</section>

<p class="warning">
  <em>Warning:</em> The UI is taken from
  <a href="http://github.com/snarfed/huffduff-video">huffduffer-video</a>!
</p>

<div id="results"></div>

<footer>
  <p><small>Source at <a href="https://github.com/boun/huffduff-rss">github.com/boun/huffduff-rss</a>.</small></p>
  <div id="debug"></div>
</footer>

<script>
  let feed = [];
  const params = new URLSearchParams(document.location.search);
  const debugging = params.get("debug");

  const feedResults = document.querySelector("#results");
  const debugDiv = document.querySelector("#debug");
  const dropZone = document.querySelector("#drop-zone");
  const fileInput = document.querySelector("#file-input");

  function debug(message) {
    if (debugging) {
      debugDiv.insertAdjacentHTML("beforeend", `${message}<br/>`);
    }
  }

  const form = document.querySelector("#rss-form");
  form.addEventListener("submit", () => {
    const input = form.querySelector("#url");
    parse(input.value.trim());
  });

  async function parseFeedText(text, sourceLabel = "Lokale Datei") {
    feed = [];

    const isHTML = text.includes("<html");
    const parser = new DOMParser();
    const data = parser.parseFromString(text, isHTML ? "text/html" : "text/xml");
    let html = "";

    if (data.querySelector("rss")) {
      html = rss(data);
    } else if (data.querySelector("feed")) {
      html = atom(data);
    } else if (data.querySelector("html")) {
      const feedLink = data.querySelector("link[type='application/rss+xml'], link[type='application/atom+xml']");
      if (feedLink && feedLink.href) {
        return parse(feedLink.href);
      } else {
        html = `<h2>${sourceLabel}: Kein Feed-Link gefunden.</h2>`;
      }
    } else {
      html = `<h2>${sourceLabel}: Kein erkennbarer RSS/Atom-Feed.</h2>`;
    }

    feedResults.innerHTML = html;
  }

  async function parseFile(file) {
    if (!file) return;

    debug(`parseFile → name: ${file.name}, type: ${file.type || "unknown"}`);

    try {
      const text = await file.text();
      await parseFeedText(text, file.name);
    } catch (e) {
      debug(`File parse failed: ${e}`);
      feedResults.innerHTML = `<h2>Fehler beim Lesen der Datei: ${e.message}</h2>`;
    }
  }

  fileInput.addEventListener("change", () => {
    parseFile(fileInput.files?.[0]);
  });

  dropZone.addEventListener("click", () => fileInput.click());
  dropZone.addEventListener("keydown", event => {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      fileInput.click();
    }
  });
  dropZone.addEventListener("dragover", event => {
    event.preventDefault();
    dropZone.classList.add("dragover");
  });
  dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
  });
  dropZone.addEventListener("drop", event => {
    event.preventDefault();
    dropZone.classList.remove("dragover");
    const file = event.dataTransfer?.files?.[0];
    parseFile(file);
  });

  function huffduff(idx) {
    const item = feed[idx];
    const url = new URL("https://huffduffer.com/add?popup=true");
    url.searchParams.set("bookmark[url]", item.url);
    url.searchParams.set("bookmark[title]", item.title);
    url.searchParams.set("bookmark[description]", item.description.substring(0, 666));

    window.location.href = url.toString();
    return false;
  }

  function rss(data) {
    const items = data.querySelectorAll("item");
    let html = "";

    items.forEach(el => {
      const title = el.querySelector("title")?.textContent || "Untitled";
      const description = el.querySelector("description")?.textContent || "";
      const enclosure = el.querySelector("enclosure");
      const mediaUrl = enclosure?.getAttribute("url");

      if (!mediaUrl) return;

      feed.push({ title, description, url: mediaUrl });

      html += `
        <article>
          <h2>
            <a href="#" onclick="huffduff(${feed.length - 1}); return false;" rel="noopener">
              ${title}
            </a>
          </h2>
        </article>
      `;
    });

    return html || "<h2>No valid media items found in feed.</h2>";
  }

  function atom(data) {
    const entries = data.querySelectorAll("entry");
    let html = "";

    entries.forEach(el => {
      const title = el.querySelector("title")?.textContent || "Untitled";
      const description = el.querySelector("summary")?.textContent || el.querySelector("content")?.textContent || "";
      const linkEl = el.querySelector("link[href]");
      const enclosure = el.querySelector("link[rel='enclosure'][href]");
      const mediaUrl = enclosure?.getAttribute("href") || linkEl?.getAttribute("href");

      if (!mediaUrl) return;

      feed.push({ title, description, url: mediaUrl });

      html += `
        <article>
          <h2>
            <a href="#" onclick="huffduff(${feed.length - 1}); return false;" rel="noopener">
              ${title}
            </a>
          </h2>
        </article>
      `;
    });

    return html || "<h2>No valid media items found in feed.</h2>";
  }

  // ARD Sounds / ARD Audiothek Support
  function isArdSoundsUrl(url) {
    return (url.includes('ardsounds.de') || url.includes('ardaudiothek.de'));
  }

  function getProxyUrl(url) {
    return "https://corsproxy.io/?url=" + encodeURIComponent(url);
  }

  function toAbsoluteArdUrl(path) {
    return new URL(path, "https://www.ardsounds.de").toString();
  }

  function extractArdEpisodeUrn(url) {
    const match = url.match(/urn:ard:episode:[a-f0-9]+/);
    return match ? match[0] : null;
  }

  function extractArdShowIdentifier(url) {
    const urnMatch = url.match(/urn:ard:show:[a-f0-9]+/);
    if (urnMatch) {
      return { kind: "coreId", value: urnMatch[0] };
    }

    const idMatch = url.match(/\/sendung\/[^?#]*\/(\d+)(?:\/|$)/);
    if (idMatch) {
      return { kind: "id", value: idMatch[1] };
    }

    return null;
  }

  function getArdAudioUrl(item) {
    const preferredAudio = item?.audios?.find(audio => audio.downloadUrl || audio.url);
    return preferredAudio?.downloadUrl || preferredAudio?.url || null;
  }

  function mapArdEpisodeItem(item) {
    const mediaUrl = getArdAudioUrl(item);

    if (!mediaUrl) return null;

    return {
      title: item.title || "Untitled",
      description: item.description || item.summary || "",
      url: mediaUrl,
      sourceUrl: item.path ? toAbsoluteArdUrl(item.path) : null
    };
  }

  async function queryArdGraphQL(query, variables = {}) {
    const response = await fetch("https://api.ardaudiothek.de/graphql", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, variables })
    });

    if (!response.ok) throw new Error(`GraphQL request failed: ${response.statusText}`);

    const data = await response.json();
    if (data.errors) throw new Error(data.errors[0].message);

    return data.data;
  }

  async function loadArdEpisode(episodeUrn) {
    const query = `
      query ArdEpisodeQuery($id: ID!) {
        item(id: $id) {
          id
          title
          summary
          description
          path
          audios {
            url
            downloadUrl
          }
          programSet {
            id
            title
            path
            coreId
          }
        }
      }
    `;

    const data = await queryArdGraphQL(query, { id: episodeUrn });
    const item = data?.item;
    const episode = mapArdEpisodeItem(item);

    if (!episode) {
      throw new Error("No audio URL found for episode");
    }

    const showUrl = item?.programSet?.path ? toAbsoluteArdUrl(item.programSet.path) : null;

    return {
      episode,
      show: {
        id: item?.programSet?.id,
        title: item?.programSet?.title || "Show",
        url: showUrl
      }
    };
  }

  async function loadArdShowEpisodes(showIdentifier) {
    const lookup = showIdentifier.kind === "coreId"
      ? "programSetByCoreId(coreId: $id)"
      : "programSet(id: $id)";

    const query = `
      query ProgramSetEpisodesQuery($id: ${showIdentifier.kind === "coreId" ? "String!" : "ID!"}, $offset: Int!, $count: Int!) {
        result: ${lookup} {
          id
          title
          description
          path
          items(
            offset: $offset
            first: $count
            filter: {
              isPublished: { equalTo: true }
              itemType: { notEqualTo: EVENT_LIVESTREAM }
            }
          ) {
            pageInfo {
              hasNextPage
            }
            nodes {
              id
              title
              description
              summary
              path
              audios {
                url
                downloadUrl
              }
            }
          }
        }
      }
    `;

    const pageSize = 100;
    const episodes = [];
    let offset = 0;
    let hasNextPage = true;
    let show = null;

    while (hasNextPage) {
      const data = await queryArdGraphQL(query, { id: showIdentifier.value, offset, count: pageSize });
      const programSet = data?.result;
      const nodes = programSet?.items?.nodes || [];

      if (!show) {
        show = {
          id: programSet?.id,
          title: programSet?.title || "Show",
          description: programSet?.description || "",
          url: programSet?.path ? toAbsoluteArdUrl(programSet.path) : null
        };
      }

      episodes.push(...nodes.map(mapArdEpisodeItem).filter(Boolean));

      hasNextPage = Boolean(programSet?.items?.pageInfo?.hasNextPage) && nodes.length > 0;
      offset += pageSize;
    }

    return {
      show,
      episodes
    };
  }

  function displayArdEpisode(episodeData) {
    const { episode, show } = episodeData;
    feed = [episode];

    const showLink = show.url
      ? `
        <p>
          <a href="#" onclick='parse(${JSON.stringify(show.url)}); return false;'>
            Ganzen Feed anzeigen: ${show.title}
          </a>
        </p>
      `
      : "";

    feedResults.innerHTML = `
      <article>
        <h2>
          <a href="#" onclick="huffduff(0); return false;" rel="noopener">
            ${episode.title}
          </a>
        </h2>
      </article>
      <p>
        <a href="#" onclick="huffduff(0); return false;" rel="noopener">
          Diese Episode zu Huffduffer senden
        </a>
      </p>
      ${showLink}
    `;
  }

  function displayArdShowEpisodes(showData) {
    const { show, episodes } = showData;
    feed = [];
    let html = show?.title ? `<h2>${show.title}</h2>` : "";

    episodes.forEach(ep => {
      feed.push(ep);
      html += `
        <article>
          <h2>
            <a href="#" onclick="huffduff(${feed.length - 1}); return false;" rel="noopener">
              ${ep.title}
            </a>
          </h2>
        </article>
      `;
    });

    feedResults.innerHTML = html || "<h2>No episodes found.</h2>";
  }

  async function parse(url, useProxy = false) {
    feed = [];
    let html = "Nothing found";

    if (!url) return;

    debug(`parse → url: ${url}`);

    if (isArdSoundsUrl(url)) {
      try {
        debug(`Detected ARD URL`);

        if (url.includes("/episode/")) {
          const episodeUrn = extractArdEpisodeUrn(url);
          if (!episodeUrn) throw new Error("Could not extract ARD episode URN");

          const episodeData = await loadArdEpisode(episodeUrn);
          displayArdEpisode(episodeData);
        } else {
          const showIdentifier = extractArdShowIdentifier(url);
          if (!showIdentifier) throw new Error("Could not extract ARD show identifier");

          const showData = await loadArdShowEpisodes(showIdentifier);
          displayArdShowEpisodes(showData);
        }

        return;
      } catch (e) {
        debug(`ARD error: ${e.message}`);
        html = `<h2>ARD parsing failed: ${e.message}</h2>`;
        feedResults.innerHTML = html;
        return;
      }
    }

    // Handle regular RSS feeds
    if (useProxy) {
      url = getProxyUrl(url);
      debug(`parse → using proxy: ${url}`);
    }

    try {
      const response = await fetch(url);
      const text = await response.text();

      debug(`Got response (#chars: ${text.length})`);

      const isHTML = text.includes("<html");
      const parser = new DOMParser();
      const data = parser.parseFromString(text, isHTML ? "text/html" : "text/xml");

      if (data.querySelector("rss")) {
        html = rss(data);
      } else if (data.querySelector("html")) {
        const feedLink = data.querySelector("link[type='application/rss+xml']");
        if (feedLink && feedLink.href) {
          return parse(feedLink.href, useProxy);
        } else {
          html = "<h2>No RSS feed link found on page.</h2>";
        }
      } else {
        html = "<h2>Not a recognizable RSS or Atom feed.</h2>";
      }
    } catch (e) {
      debug(`Fetch failed: ${e}`);
      html = `<h2>Fetch error or CORS issue. <a href="#" onclick='parse("${url}", true); return false;'>Try using proxy?</a></h2>`;
    }

    feedResults.innerHTML = html;
  }
</script>

</body>
</html>
